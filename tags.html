    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 更新统计
            document.getElementById('tag-type-count').textContent = Object.keys(tagCounts).length + ' 种';
            
            // 最热标签
            const topTag = Object.entries(tagCounts).sort((a, b) => b[1] - a[1])[0];
            if (topTag) {
                document.getElementById('top-tag').textContent = topTag[0] + ' (' + topTag[1] + ' 篇)';
